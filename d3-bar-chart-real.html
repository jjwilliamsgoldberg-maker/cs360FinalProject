<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top SF Neighborhoods by Median Assessed Value (2024)</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            font-family: Georgia, serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f5f5f5;
            padding: 20px;
        }
        h1 {
            color: #2c3e50;
            font-size: 1.3em;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #7f8c8d;
            font-size: 0.9em;
            margin-bottom: 15px;
        }
        .chart-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .source {
            font-size: 0.8em;
            color: #95a5a6;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="chart-container">
        <h1>Top 10 SF Neighborhoods by Median Assessed Value (2024)</h1>
        <p class="subtitle">Residential properties only | n = sample count per neighborhood</p>
        <div id="chart"></div>
        <p class="source">Data: SF Assessor Historical Secured Property Tax Rolls (data.sfgov.org)</p>
    </div>
    
    <script>
        const data = [
            {"neighborhood": "Seacliff", "median_price": 1919297, "count": 119},
            {"neighborhood": "Presidio Heights", "median_price": 1508095, "count": 370},
            {"neighborhood": "Pacific Heights", "median_price": 1410222, "count": 888},
            {"neighborhood": "Marina", "median_price": 1351688, "count": 834},
            {"neighborhood": "Noe Valley", "median_price": 1137194, "count": 311},
            {"neighborhood": "Financial District/South Beach", "median_price": 1128427, "count": 1096},
            {"neighborhood": "Haight Ashbury", "median_price": 1092572, "count": 533},
            {"neighborhood": "Castro/Upper Market", "median_price": 1088876, "count": 920},
            {"neighborhood": "Twin Peaks", "median_price": 1004444, "count": 297},
            {"neighborhood": "Inner Richmond", "median_price": 980158, "count": 641}
        ];
        
        const margin = {top: 20, right: 120, bottom: 40, left: 180};
        const width = 750 - margin.left - margin.right;
        const height = 420 - margin.top - margin.bottom;
        
        const svg = d3.select("#chart")
            .append("svg")
            .attr("width", width + margin.left + margin.right)
            .attr("height", height + margin.top + margin.bottom)
            .append("g")
            .attr("transform", `translate(${margin.left},${margin.top})`);
        
        // Y scale (neighborhoods)
        const y = d3.scaleBand()
            .domain(data.map(d => d.neighborhood))
            .range([0, height])
            .padding(0.2);
        
        // X scale (price)
        const x = d3.scaleLinear()
            .domain([0, 2000000])
            .range([0, width]);
        
        // Color scale
        const color = d3.scaleSequential()
            .domain([900000, 2000000])
            .interpolator(d3.interpolateBlues);
        
        // Y axis
        svg.append("g")
            .call(d3.axisLeft(y))
            .selectAll("text")
            .style("font-size", "11px");
        
        // X axis
        svg.append("g")
            .attr("transform", `translate(0,${height})`)
            .call(d3.axisBottom(x).ticks(5).tickFormat(d => "$" + d3.format(".2s")(d)));
        
        // Bars
        svg.selectAll(".bar")
            .data(data)
            .join("rect")
            .attr("class", "bar")
            .attr("y", d => y(d.neighborhood))
            .attr("x", 0)
            .attr("width", d => x(d.median_price))
            .attr("height", y.bandwidth())
            .attr("fill", d => color(d.median_price));
        
        // Price labels
        svg.selectAll(".price-label")
            .data(data)
            .join("text")
            .attr("class", "price-label")
            .attr("y", d => y(d.neighborhood) + y.bandwidth() / 2)
            .attr("x", d => x(d.median_price) + 5)
            .attr("dy", "0.35em")
            .style("font-size", "10px")
            .style("fill", "#333")
            .text(d => "$" + d3.format(",.0f")(d.median_price));
        
        // Highlight Inner Richmond
        svg.selectAll(".bar")
            .filter(d => d.neighborhood === "Inner Richmond")
            .attr("fill", "#e74c3c");
        
        // Add annotation for Inner Richmond
        svg.append("text")
            .attr("x", x(980158) + 100)
            .attr("y", y("Inner Richmond") + y.bandwidth() / 2 - 15)
            .style("font-size", "10px")
            .style("fill", "#e74c3c")
            .text("← Your neighborhood");
        
        // X axis label
        svg.append("text")
            .attr("x", width / 2)
            .attr("y", height + 35)
            .attr("text-anchor", "middle")
            .style("font-size", "12px")
            .text("Median Assessed Value ($)");
    </script>
</body>
</html>
